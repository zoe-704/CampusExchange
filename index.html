
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Campus Exchange</title>
      <script type="text/javascript">
        // Decodes the redirect that public/404.html produces on GitHub
        // Pages, restoring the real path (e.g. /CampusExchange/browse)
        // via history.replaceState before React Router mounts. No-op
        // anywhere else (local dev, a real matching route).
        (function (l) {
          if (l.search[1] === "/") {
            var decoded = l.search
              .slice(1)
              .split("&")
              .map(function (s) {
                return s.replace(/~and~/g, "&");
              })
              .join("?");
            window.history.replaceState(null, "", l.pathname.slice(0, -1) + decoded + l.hash);
          }
        })(window.location);
      </script>
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
